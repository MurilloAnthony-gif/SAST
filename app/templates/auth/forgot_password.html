{% extends 'base.html' %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="glass-card" style="width:100%;max-width:440px;padding:40px 36px;">

    <div class="text-center mb-4">
      <div class="stat-icon amber mx-auto mb-3" style="width:56px;height:56px;font-size:1.5rem;border-radius:16px;">
        <i class="bi bi-key-fill"></i>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;color:var(--text-primary);">¿Olvidaste tu contraseña?</h1>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-top:6px;">
        Ingresa tu correo y te enviaremos un enlace para restablecerla.
      </p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group mb-4">
        <label class="form-label" for="correo">
          <i class="bi bi-envelope-fill me-1"></i> Correo electrónico
        </label>
        <input type="email" id="correo" name="correo" class="form-control"
               placeholder="tucorreo@ejemplo.com" required autofocus>
      </div>

      <button type="submit" class="btn-primary-custom w-100">
        <i class="bi bi-send-fill me-2"></i>Enviar enlace de recuperación
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="{{ url_for('auth.login') }}" style="color:var(--primary-light);font-size:0.85rem;">
        <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
      </a>
    </div>

  </div>
</div>
{% endblock %}
