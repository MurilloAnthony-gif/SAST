{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="auth-page" style="min-height:100vh;">
    <div class="form-wrapper">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="brand-icon mx-auto">
                <i class="bi bi-cpu-fill"></i>
            </div>
            <h1 class="form-title mt-2">Bienvenido a SAST</h1>
            <p class="form-subtitle">Sistema de Servicio Técnico</p>
        </div>

        <!-- Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label" for="correo">
                    <i class="bi bi-envelope me-1"></i>Correo Electrónico
                </label>
                <input
                    type="email"
                    class="form-control"
                    id="correo"
                    name="correo"
                    placeholder="tu@correo.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="contrasena">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <div class="position-relative">
                    <input
                        type="password"
                        class="form-control"
                        id="contrasena"
                        name="contrasena"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y pe-3 border-0"
                            style="background:none;color:var(--text-muted);"
                            onclick="togglePassword('contrasena', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label" for="remember" style="color:var(--text-secondary);font-size:0.85rem;">
                        Recordarme
                    </label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}"
                   style="color:var(--primary-light);font-size:0.83rem;text-decoration:none;">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <button type="submit" class="btn-primary-custom w-100 justify-content-center" id="loginBtn">
                <i class="bi bi-box-arrow-in-right"></i>
                Iniciar Sesión
            </button>
        </form>

        <div class="divider">o</div>

        <p class="text-center" style="color:var(--text-muted);font-size:0.875rem;">
            ¿No tienes cuenta?
            <a href="{{ url_for('auth.register') }}" style="color:var(--primary-light);font-weight:600;text-decoration:none;">
                Regístrate aquí
            </a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spin"><i class="bi bi-hourglass-split"></i></span> Verificando...';
    btn.disabled = true;
});
</script>
{% endblock %}
