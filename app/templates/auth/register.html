{% extends 'base.html' %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="auth-page" style="min-height:100vh;align-items:flex-start;padding-top:32px;padding-bottom:32px;">
    <div class="form-wrapper" style="max-width:600px;">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="brand-icon mx-auto">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h1 class="form-title mt-2">Crear Cuenta</h1>
            <p class="form-subtitle">Regístrate para solicitar servicios técnicos</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Datos Personales -->
            <div class="mb-3" style="color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">
                <i class="bi bi-person me-1"></i>Datos Personales
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label" for="ncedula">Número de Cédula *</label>
                    <input type="text" class="form-control" id="ncedula" name="ncedula"
                           placeholder="0123456789" required maxlength="20"
                           value="{{ form_data.get('ncedula', '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="fecha_nacimiento">Fecha de Nacimiento *</label>
                    <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento"
                           required value="{{ form_data.get('fecha_nacimiento', '') }}">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label" for="nombres">Nombres *</label>
                    <input type="text" class="form-control" id="nombres" name="nombres"
                           placeholder="Juan Carlos" required
                           value="{{ form_data.get('nombres', '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="apellidos">Apellidos *</label>
                    <input type="text" class="form-control" id="apellidos" name="apellidos"
                           placeholder="Pérez García" required
                           value="{{ form_data.get('apellidos', '') }}">
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label" for="numero_telefono">Teléfono *</label>
                    <input type="tel" class="form-control" id="numero_telefono" name="numero_telefono"
                           placeholder="+57 300 000 0000" required
                           value="{{ form_data.get('numero_telefono', '') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="sector">Sector / Barrio *</label>
                    <input type="text" class="form-control" id="sector" name="sector"
                           placeholder="Chapinero" required
                           value="{{ form_data.get('sector', '') }}">
                </div>
            </div>

            <!-- Credenciales -->
            <div class="mb-3 mt-2" style="color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">
                <i class="bi bi-shield-lock me-1"></i>Credenciales de Acceso
            </div>

            <div class="form-group">
                <label class="form-label" for="correo">Correo Electrónico *</label>
                <input type="email" class="form-control" id="correo" name="correo"
                       placeholder="tu@correo.com" required autocomplete="email"
                       value="{{ form_data.get('correo', '') }}">
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label" for="contrasena">Contraseña *</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="contrasena" name="contrasena"
                               placeholder="Mín. 6 caracteres" required minlength="6">
                        <button type="button" class="btn position-absolute end-0 top-50 translate-middle-y pe-3 border-0"
                                style="background:none;color:var(--text-muted);"
                                onclick="togglePassword('contrasena', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="confirm_password">Confirmar Contraseña *</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Repite la contraseña" required>
                </div>
            </div>

            <!-- Términos y Condiciones -->
            <div class="mb-4" style="margin-top:20px;">
                <div class="mb-3" style="color:var(--text-muted);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">
                    <i class="bi bi-file-earmark-text me-1"></i>Aceptación de Términos
                </div>

                <div class="terms-check mb-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="declaracion_veracidad"
                               id="declaracion_veracidad" required
                               {% if form_data.get('declaracion_veracidad') %}checked{% endif %}>
                        <label class="form-check-label" for="declaracion_veracidad">
                            <strong>Declaración de Veracidad:</strong> Declaro que la información proporcionada
                            es verídica y completa.
                        </label>
                    </div>
                </div>

                <div class="terms-check">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="autorizacion_datos"
                               id="autorizacion_datos" required
                               {% if form_data.get('autorizacion_datos') %}checked{% endif %}>
                        <label class="form-check-label" for="autorizacion_datos">
                            <strong>Autorización de Datos:</strong> Autorizo el tratamiento de mis datos
                            personales para la prestación del servicio técnico.
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary-custom w-100 justify-content-center" id="registerBtn">
                <i class="bi bi-person-check"></i>
                Crear Cuenta
            </button>
        </form>

        <div class="divider">o</div>

        <p class="text-center" style="color:var(--text-muted);font-size:0.875rem;">
            ¿Ya tienes cuenta?
            <a href="{{ url_for('auth.login') }}" style="color:var(--primary-light);font-weight:600;text-decoration:none;">
                Inicia sesión
            </a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

// Validación de contraseñas
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pass = document.getElementById('contrasena').value;
    const confirm = document.getElementById('confirm_password').value;

    if (pass !== confirm) {
        e.preventDefault();
        alert('Las contraseñas no coinciden.');
        return;
    }

    const btn = document.getElementById('registerBtn');
    btn.innerHTML = '<span class="spin"><i class="bi bi-hourglass-split"></i></span> Registrando...';
    btn.disabled = true;
});
</script>
{% endblock %}
