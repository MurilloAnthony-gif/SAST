{% extends 'base.html' %}
{% block title %}Nueva Contraseña{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:70vh;">
  <div class="glass-card" style="width:100%;max-width:440px;padding:40px 36px;">

    <div class="text-center mb-4">
      <div class="stat-icon green mx-auto mb-3" style="width:56px;height:56px;font-size:1.5rem;border-radius:16px;">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1 style="font-size:1.5rem;font-weight:800;color:var(--text-primary);">Crear nueva contraseña</h1>
      <p style="color:var(--text-muted);font-size:0.88rem;margin-top:6px;">
        Elige una contraseña segura de al menos 6 caracteres.
      </p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" id="resetForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group mb-3">
        <label class="form-label" for="nueva_contrasena">
          <i class="bi bi-lock-fill me-1"></i> Nueva contraseña
        </label>
        <div style="position:relative;">
          <input type="password" id="nueva_contrasena" name="nueva_contrasena"
                 class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6"
                 style="padding-right:44px;">
          <button type="button" onclick="togglePass('nueva_contrasena', this)"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="form-label" for="confirmar_contrasena">
          <i class="bi bi-lock-fill me-1"></i> Confirmar contraseña
        </label>
        <div style="position:relative;">
          <input type="password" id="confirmar_contrasena" name="confirmar_contrasena"
                 class="form-control" placeholder="Repite tu nueva contraseña" required
                 style="padding-right:44px;">
          <button type="button" onclick="togglePass('confirmar_contrasena', this)"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                         background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
        <div id="matchError" style="color:#fca5a5;font-size:0.78rem;margin-top:4px;display:none;">
          <i class="bi bi-exclamation-circle me-1"></i>Las contraseñas no coinciden.
        </div>
      </div>

      <button type="submit" class="btn-primary-custom w-100">
        <i class="bi bi-check-circle-fill me-2"></i>Guardar nueva contraseña
      </button>
    </form>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePass(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = isText ? '<i class="bi bi-eye-fill"></i>' : '<i class="bi bi-eye-slash-fill"></i>';
}

document.getElementById('resetForm').addEventListener('submit', function(e) {
    const p1 = document.getElementById('nueva_contrasena').value;
    const p2 = document.getElementById('confirmar_contrasena').value;
    const err = document.getElementById('matchError');
    if (p1 !== p2) {
        err.style.display = 'block';
        e.preventDefault();
    } else {
        err.style.display = 'none';
    }
});
</script>
{% endblock %}
